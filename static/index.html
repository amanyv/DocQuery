<!doctype html>
<html>
  <head>
    <title>DocQuery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(135deg, #e0e7ff, #f8fafc);
      }

      .container {
        display: flex;
        height: 100vh;
      }

      .sidebar {
        width: 270px;
        background: rgba(30, 30, 46, 0.95);
        backdrop-filter: blur(12px);
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sidebar h3 {
        margin: 0;
        font-size: 14px;
        color: #9ca3af;
      }

      .upload-btn {
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-weight: 500;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .upload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
      }

      #file-list {
        flex: 1;
        overflow-y: auto;
      }

      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 8px;
        transition: 0.2s;
      }

      .file-item:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .del-btn {
        border: none;
        background: none;
        color: #f87171;
        cursor: pointer;
      }

      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      h2 {
        margin: 0;
        padding: 16px;
        text-align: center;
        color: white;
        font-weight: 600;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        letter-spacing: 0.5px;
      }

      #chat {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 65%;
        padding: 14px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.6;
        animation: fadeIn 0.3s ease;
      }

      .user {
        align-self: flex-end;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        border-bottom-right-radius: 6px;
      }

      .bot {
        align-self: flex-start;
        background: white;
        color: #111827;
        border-bottom-left-radius: 6px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      .bot p {
        margin: 6px 0;
      }

      .bot ul {
        padding-left: 18px;
      }

      .input-box {
        display: flex;
        gap: 10px;
        padding: 16px;
        background: white;
        border-top: 1px solid #eee;
      }

      input[type="text"] {
        flex: 1;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
      }

      input[type="text"]:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      .send-btn {
        padding: 12px 18px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        cursor: pointer;
        transition: 0.25s;
      }

      .send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.35);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: #c7d2fe;
        border-radius: 10px;
      }

      #file-input {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <h3>📄 PDF Files</h3>
        <button
          class="upload-btn"
          onclick="document.getElementById('file-input').click()"
        >
          + Upload PDF
        </button>
        <input
          type="file"
          id="file-input"
          accept=".pdf"
          multiple
          onchange="uploadFiles(this)"
        />
        <div id="upload-status"></div>
        <div id="file-list"></div>
      </div>

      <div class="chat-area">
        <h2>DocQuery</h2>
        <div id="chat"></div>
        <div class="input-box">
          <input
            type="text"
            id="q"
            placeholder="Ask something..."
            onkeydown="if (event.key === 'Enter') send();"
          />
          <button class="send-btn" onclick="send()">Send</button>
        </div>
      </div>
    </div>

    <script>
      const API = "";
      const WORD_LIMIT = 50;

      const VALID_WORD_RE = /^[a-zA-Z\u00C0-\u024F\u0900-\u097F''\-\s]*$/;

      loadFiles();

      async function loadFiles() {
        const res = await fetch(API + "/api/files");
        const data = await res.json();
        renderFiles(data.files || []);
      }

      function renderFiles(files) {
        const list = document.getElementById("file-list");
        list.innerHTML = "";
        if (files.length === 0) {
          list.innerHTML =
            '<div style="color:#888;font-size:12px;">No PDFs uploaded yet</div>';
          return;
        }
        files.forEach((f) => {
          const item = document.createElement("div");
          item.className = "file-item";
          item.innerHTML = `
      <span title="${f}">📄 ${f}</span>
      <button class="del-btn" onclick="deleteFile('${f}')" title="Delete">✕</button>
    `;
          list.appendChild(item);
        });
      }

      async function uploadFiles(input) {
        const status = document.getElementById("upload-status");
        const files = input.files;
        if (!files.length) return;

        status.style.color = "#c7d2fe";
        status.textContent = "Uploading...";

        const formData = new FormData();
        for (const file of files) formData.append("files", file);

        const res = await fetch(API + "/api/upload", {
          method: "POST",
          body: formData,
        });
        const data = await res.json();

        if (data.error) {
          status.style.color = "#f87171";
          status.textContent = data.error;
        } else {
          status.style.color = "#7aff7a";
          status.textContent = "✓ Uploaded! Indexing…";
          loadFiles();
          startPolling();
        }

        input.value = "";
      }

      async function deleteFile(filename) {
        if (!confirm(`Delete ${filename}?`)) return;
        await fetch(API + `/api/files/${filename}`, { method: "DELETE" });
        loadFiles();
        startPolling();
      }

      function startPolling() {
        setIndexingUI(true);
        if (pollInterval) return;
        pollInterval = setInterval(async () => {
          try {
            const res = await fetch(API + "/api/status");
            const data = await res.json();
            if (!data.indexing) {
              stopPolling();
              const status = document.getElementById("upload-status");
              if (data.error) {
                status.style.color = "#f87171";
                status.textContent = "✗ " + data.error;
              } else if (data.ready) {
                status.style.color = "#7aff7a";
                status.textContent = "✓ Ready to answer questions!";
                setTimeout(() => (status.textContent = ""), 4000);
              }
            }
          } catch (e) {
            console.warn("Status poll failed", e);
          }
        }, 2000);
      }

      function stopPolling() {
        clearInterval(pollInterval);
        pollInterval = null;
        setIndexingUI(false);
      }
 
      function setIndexingUI(isIndexing) {
        document.getElementById("indexing-banner").style.display = isIndexing ? "flex" : "none";
        document.getElementById("upload-btn").disabled = isIndexing;
      }

      function add(role, text) {
        const div = document.createElement("div");
        div.className = "msg " + role;

        if (role === "bot") {
          const label = document.createElement("strong");
          label.textContent = "Doc:";
          label.style.display = "block";
          label.style.marginBottom = "4px";
          div.appendChild(label);
          const content = document.createElement("div");
          content.innerHTML = marked.parse(text);
          div.appendChild(content);
        } else {
          div.textContent = "You: " + text;
        }

        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      async function send() {
        const q = document.getElementById("q").value.trim();
        if (!q) return;

        add("user", q);
        document.getElementById("q").value = "";

        const loading = document.createElement("div");
        loading.className = "msg bot";
        loading.id = "loading";
        loading.textContent = "Doc: Thinking...";
        document.getElementById("chat").appendChild(loading);

        const res = await fetch(API + "/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        });

        document.getElementById("loading").remove();
        const data = await res.json();
        add("bot", data.answer || data.error || "Error");
      }
    </script>
  </body>
</html>
